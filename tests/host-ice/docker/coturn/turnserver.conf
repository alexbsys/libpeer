listening-port=3478
tls-listening-port=5349
# Lab: one relay thread — avoids dozens of duplicate listeners on the same port.
relay-threads=1
fingerprint
lt-cred-mech
user=testuser:testpass
realm=libpeer-ice.test
no-multicast-peers
no-cli
verbose

# Required for 127.0.0.1 relay-to-relay ICE tests on one host.
allow-loopback-peers

# TCP relay control (UDP relay addresses in Allocate responses)
# no-tcp-relay
